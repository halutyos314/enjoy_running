<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Random Running Route Generator</title>
</head>
<body>

<h2>ランダムランニングルート生成</h2>
スマホでのアクセスを想定してます。<br>
距離x[km]を入力して"test"ボタンを押すと、GPSの現在位置情報を取得して一周x[km]くらいのコースをGoogle Mapで表示するで。<br>

※ブラウザに位置情報を許可する必要あり<br>
※一周がx[km]よりも多くなってそうです。後日修正。<br>
<br>
<label>距離 (km): </label>
<input type="number" id="distance" value="10" step="0.1">
<button onclick="generateRoute()">ルート生成</button>

<script>
function kiloToDeg(ido_keido) {
    const ido = ido_keido[0];
    const keido = ido_keido[1];
    const keido_u = 91;
    const ido_u = 111;

    return [ido / ido_u, keido / keido_u];
}

function generateRoute() {

    navigator.geolocation.getCurrentPosition(function(position) {

        const start = [
            position.coords.latitude,
            position.coords.longitude
        ];

        const circle = parseFloat(document.getElementById("distance").value);

        const houi = Math.random() * 2.0 * Math.PI;
        const r = circle / 2.0 / Math.PI;

        const center = [
            r * Math.cos(houi),
            r * Math.sin(houi)
        ];

        const far = [center[0] * 2, center[1] * 2];

        const right = [
            center[0] + r * Math.cos(houi + Math.PI / 2.0),
            center[1] + r * Math.sin(houi + Math.PI / 2.0)
        ];

        const left = [
            center[0] + r * Math.cos(houi - Math.PI / 2.0),
            center[1] + r * Math.sin(houi - Math.PI / 2.0)
        ];

        let far_deg = kiloToDeg(far);
        let right_deg = kiloToDeg(right);
        let left_deg = kiloToDeg(left);

        far_deg = [far_deg[0] + start[0], far_deg[1] + start[1]];
        right_deg = [right_deg[0] + start[0], right_deg[1] + start[1]];
        left_deg = [left_deg[0] + start[0], left_deg[1] + start[1]];

        const URL = `https://www.google.com/maps/dir/?api=1&origin=${start[0]},${start[1]}&destination=${start[0]},${start[1]}&waypoints=${left_deg[0]},${left_deg[1]}|${far_deg[0]},${far_deg[1]}|${right_deg[0]},${right_deg[1]}&travelmode=walking`;

        // ✅ 直接リダイレクト
        window.location.href = URL;

    }, function(error) {
        alert("位置情報の取得に失敗しました。ブラウザの位置情報を許可してください。");
    });
}
</script>

</body>
</html>
